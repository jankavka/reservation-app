databaseChangeLog:
  - changeSet:
      id: 001
      author: jan
      changes:
        - createTable:
            tableName: attendances
            columns:
              - column:
                  name: booking_id
                  type: BIGINT
              - column:
                  name: present
                  type: BOOLEAN
              - column:
                  name: note
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: DATETIME
        - createTable:
            tableName: bookings
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: training_slot_id
                  type: BIGINT
              - column:
                  name: player_id
                  type: BIGINT
              - column:
                  name: booking_status
                  type: VARCHAR(60)
              - column:
                  name: booked_at
                  type: DATETIME
        - createTable:
            tableName: coaches
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: bio
                  type: VARCHAR(1000)
              - column:
                  name: certification
                  type: VARCHAR(60)
        - createTable:
            tableName: court_blocks
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: court_id
                  type: bigint
              - column:
                  name: blocked_from
                  type: DATETIME
              - column:
                  name: reason
                  type: VARCHAR(255)
              - column:
                  name: range
                  type: TSRANGE
        - createTable:
            tableName: courts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(60)
              - column:
                  name: surface
                  type: VARCHAR(60)
              - column:
                  name: indoor
                  type: BOOLEAN
              - column:
                  name: venue_id
                  type: BIGINT
        - createTable:
            tableName: enrollments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: player_id
                  type: BIGINT
              - column:
                  name: group_id
                  type: BIGINT
              - column:
                  name: state
                  type: VARCHAR(60)
              - column:
                  name: created_at
                  type: DATETIME
        - createTable:
            tableName: groups
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(60)
              - column:
                  name: coach_id
                  type: BIGINT
              - column:
                  name: season_id
                  type: BIGINT
              - column:
                  name: capacity
                  type: INT
        - createTable:
            tableName: invoice_summaries
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: player_id
                  type: BIGINT
              - column:
                  name: month
                  type: VARCHAR(20)
              - column:
                  name: total_cents_amount
                  type: INT
              - column:
                  name: currency
                  type: VARCHAR(10)
              - column:
                  name: generated_at
                  type: DATETIME
              - column:
                  name: path
                  type: VARCHAR(255)
        - createTable:
            tableName: packages
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(60)
              - column:
                  name: available_slots
                  type: INT
              - column:
                  name: valid_from
                  type: DATE
              - column:
                  name: valid_to
                  type: DATE
              - column:
                  name: generated_at
                  type: DATE
              - column:
                  name: path
                  type: VARCHAR(255)
        - createTable:
            tableName: players
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: full_name
                  type: VARCHAR(255)
              - column:
                  name: birth_date
                  type: DATETIME
              - column:
                  name: handedness
                  type: VARCHAR(60)
              - column:
                  name: parent_id
                  type: BIGINT
              - column:
                  name: pricing_type
                  type: VARCHAR(60)
              - column:
                  name: note
                  type: VARCHAR(255)
              - column:
                  name: package
                  type: BIGINT
        - createTable:
            tableName: pricing_rules
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(60)
                  constraints:
                    unique: true
              - column:
                  name: pricing_type
                  type: VARCHAR(60)
              - column:
                  name: amount_cents
                  type: INT
              - column:
                  name: currency
                  type: VARCHAR(10)
              - column:
                  name: conditions
                  type: JSONB
        - createTable:
            tableName: seasons
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(60)
              - column:
                  name: date_from
                  type: DATETIME
              - column:
                  name: date_until
                  type: DATETIME
        - createTable:
            tableName: training_slots
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: group_id
                  type: BIGINT
              - column:
                  name: court_id
                  type: BIGINT
              - column:
                  name: start_at
                  type: DATETIME
              - column:
                  name: end_at
                  type: DATETIME
              - column:
                  name: capacity
                  type: INT
              - column:
                  name: status
                  type: VARCHAR(60)
              - column:
                  name: price
                  type: VARCHAR(60)
              - column:
                  name: currency
                  type: VARCHAR(60)
              - column:
                  name: court_blocking_id
                  type: BIGINT
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    unique: true
              - column:
                  name: telephone_number
                  type: VARCHAR(60)
              - column:
                  name: password
                  type: VARCHAR(255)
              - column:
                  name: full_name
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: DATETIME
        - createTable:
            tableName: user_roles
            columns:
              - column:
                  name: users
                  type: BIGINT
              - column:
                  name: roles
                  type: VARCHAR(60)
        - createTable:
            tableName: venues
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(60)
              - column:
                  name: address
                  type: VARCHAR(255)
              - column:
                  name: phone_number
                  type: VARCHAR(60)
        - createTable:
            tableName: weather_notes
            columns:
              - column:
                  name: training_slot_id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: weather_condition
                  type: VARCHAR(60)
              - column:
                  name: note
                  type: VARCHAR(255)
        - addForeignKeyConstraint:
            baseTableName: attendances
            baseColumnNames: booking_id
            constraintName: fk_booking
            referencedColumnNames: id
            referencedTableName: bookings
        - addForeignKeyConstraint:
            baseTableName: bookings
            baseColumnNames: training_slot_id
            constraintName: fk_training_slot
            referencedColumnNames: id
            referencedTableName: training_slots
        - addForeignKeyConstraint:
            baseTableName: bookings
            baseColumnNames: player_id
            constraintName: fk_player_booking
            referencedColumnNames: id
            referencedTableName: players
        - addForeignKeyConstraint:
            baseTableName: coaches
            baseColumnNames: user_id
            constraintName: fk_user
            referencedColumnNames: id
            referencedTableName: users
        - addForeignKeyConstraint:
            baseTableName: court_blocks
            baseColumnNames: court_id
            constraintName: fk_court
            referencedColumnNames: id
            referencedTableName: courts
        - addForeignKeyConstraint:
            baseTableName: courts
            baseColumnNames: venue_id
            constraintName: fk_venue
            referencedColumnNames: id
            referencedTableName: venues
        - addForeignKeyConstraint:
            baseTableName: enrollments
            baseColumnNames: player_id
            constraintName: fk_player_enroll
            referencedColumnNames: id
            referencedTableName: players
        - addForeignKeyConstraint:
            baseTableName: enrollments
            baseColumnNames: group_id
            constraintName: fk_group
            referencedColumnNames: id
            referencedTableName: groups
        - addForeignKeyConstraint:
            baseTableName: groups
            baseColumnNames: season_id
            constraintName: fk_season
            referencedColumnNames: id
            referencedTableName: seasons
        - addForeignKeyConstraint:
            baseTableName: groups
            baseColumnNames: coach_id
            constraintName: fk_coach
            referencedColumnNames: user_id
            referencedTableName: coaches
        - addForeignKeyConstraint:
            baseTableName: invoice_summaries
            baseColumnNames: player_id
            constraintName: fk_player_summaries
            referencedColumnNames: id
            referencedTableName: players
        - addForeignKeyConstraint:
            baseTableName: players
            baseColumnNames: parent_id
            constraintName: fk_parent
            referencedColumnNames: id
            referencedTableName: users
        - addForeignKeyConstraint:
            baseTableName: players
            baseColumnNames: package
            constraintName: fk_package
            referencedColumnNames: id
            referencedTableName: packages
        - addForeignKeyConstraint:
            baseTableName: training_slots
            baseColumnNames: group_id
            constraintName: fk_group_slots
            referencedColumnNames: id
            referencedTableName: groups
        - addForeignKeyConstraint:
            baseTableName: training_slots
            baseColumnNames: court_id
            constraintName: fk_court_slots
            referencedColumnNames: id
            referencedTableName: courts
        - addForeignKeyConstraint:
            baseTableName: training_slots
            baseColumnNames: court_blocking_id
            constraintName: fk_court_block
            referencedColumnNames: training_slot_id
            referencedTableName: weather_notes
        - addForeignKeyConstraint:
            baseTableName: weather_notes
            baseColumnNames: training_slot_id
            constraintName: fk_slot_notes
            referencedColumnNames: id
            referencedTableName: training_slots
