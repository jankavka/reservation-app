          format: int32
        currency:
          type: string
        conditions:
          type: object
          additionalProperties: {}
        packagee:
          type: array
          items:
            $ref: "#/components/schemas/PackageDto"
      required:
        - amountCents
        - currency
        - name
        - pricingType
    InvoiceSummaryDto:
