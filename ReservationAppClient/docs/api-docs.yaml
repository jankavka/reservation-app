components:
  schemas:
    CoachDto:
      type: "null"
      properties:
        id:
          type: integer
          format: int64
        user:
          $ref: "#/components/schemas/UserDto"
        bio:
          type: string
          minLength: 1
        certification:
          type: string
          minLength: 1
      required:
        - bio
        - certification
        - user
    CourtDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
        surface:
          type: string
          enum:
            - CLAY
            - HARD
            - WIMBLEDON
        indoor:
          type: boolean
        lighting:
          type: boolean
        venue:
          $ref: "#/components/schemas/VenueDto"
      required:
        - indoor
        - lighting
        - name
        - surface
        - venue
    GroupDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
        level:
          type: string
          enum:
            - BEGINNER
            - INTERMEDIATE
            - ADVANCED
            - PRO
        coach:
          $ref: "#/components/schemas/CoachDto"
        capacity:
          type: integer
          format: int32
          minimum: 1
        season:
          $ref: "#/components/schemas/SeasonDto"
      required:
        - capacity
        - level
        - name
        - season
    SeasonDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
        dateFrom:
          type: string
          format: date-time
        dateUntil:
          type: string
          format: date-time
      required:
        - dateFrom
        - dateUntil
        - name
    TrainingSlotDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        group:
          $ref: "#/components/schemas/GroupDto"
        court:
          $ref: "#/components/schemas/CourtDto"
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        capacity:
          type: integer
          format: int32
        status:
          type: string
          enum:
            - OPEN
            - CANCELED
        price:
          type: string
        currency:
          type: string
          minLength: 1
        courtBlockingId:
          type: integer
          format: int64
      required:
        - court
        - currency
        - endAt
        - group
        - startAt
        - status
    UserDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        telephoneNumber:
          type: string
        fullName:
          type: string
        roles:
          type: array
          items:
            type: string
            enum:
              - ADMIN
              - COACH
              - PARENT
              - PLAYER
          minItems: 1
          uniqueItems: true
        createdAt:
          type: string
          format: date-time
      required:
        - email
        - fullName
        - roles
    VenueDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
        address:
          type: string
          minLength: 1
        phoneNumber:
          type: string
          maxLength: 2147483647
          minLength: 9
      required:
        - address
        - name
        - phoneNumber
    WeatherNotesDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        trainingSlot:
          $ref: "#/components/schemas/TrainingSlotDto"
        weatherCondition:
          type: string
          enum:
            - RAIN
            - WIND
            - HEAT
            - OK
        note:
          type: string
      required:
        - trainingSlot
    PackageDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        player:
          $ref: "#/components/schemas/PlayerDto"
        name:
          type: string
          minLength: 1
        availableSlots:
          type: integer
          format: int32
        validFrom:
          type: string
          format: date
        validTo:
          type: string
          format: date
        generatedAt:
          type: string
          format: date
        path:
          type: string
        pricingRuleId:
          type: integer
          format: int64
      required:
        - name
        - player
        - pricingRuleId
        - validFrom
        - validTo
    PlayerDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        fullName:
          type: string
          minLength: 1
        birthDate:
          type: string
          format: date-time
        handedness:
          type: string
          enum:
            - LEFT
            - RIGHT
        parent:
          $ref: "#/components/schemas/UserDto"
        pricingType:
          type: string
          enum:
            - PER_SLOT
            - MONTHLY
            - PACKAGE
        note:
          type: string
        packagee: {}
      required:
        - birthDate
        - fullName
        - handedness
        - parent
    PricingRuleDto:
